<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ZEKOO ADMIN</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<div class="logo-box">

<img src="logo.jpg" class="logo">

<h2>لوحة إدارة ZEKOO</h2>

</div>

</header>

<section style="padding:30px;max-width:700px;margin:auto;">

<h2 class="title">إضافة منتج جديد</h2>

<input id="p-title" type="text" placeholder="اسم المنتج">

<input id="p-price" type="number" placeholder="السعر">

<input id="p-sizes" type="text" placeholder="المقاسات مثال: S,M,L,XL">

<input id="p-colors" type="text" placeholder="الألوان مثال: أبيض، أسود">

<input id="p-img-file" type="file" accept="image/*">

<button onclick="addProduct()">

إضافة المنتج

</button>

</section>

<script type="module" src="script.js"></script>

</body>

</html>
