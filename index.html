<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEKOO IRAQ</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
    /* تنسيق إضافي للسلة */
    #cart-box { position:fixed; bottom:20px; right:20px; background:#181818; padding:15px; border-radius:15px; box-shadow:0 0 15px #FFD700; z-index:1000; width:260px; max-height:350px; overflow-y:auto; border: 1px solid #FFD700; }
</style>
</head>

<body>

<header class="header">
    <div class="logo-box">
        <img src="logo.jpg" class="logo">
        <h2>ZEKOO IRAQ</h2>
    </div>
    <nav>
        <a href="#">الرئيسية</a>
        <a href="#products">المنتجات</a>
        <a href="#contact">تواصل</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-text">
        <h1>مرحباً بكم في متجر ZEKOO IRAQ</h1>
        <p>أفضل الملابس بأفضل جودة وأفضل سعر</p>
        <a href="#products" class="btn">تسوق الآن</a>
    </div>
</section>

<section id="products">
    <h2 class="title">🔥 أحدث المنتجات</h2>
    <div id="products-container" class="grid-container"></div>
</section>

<!-- السلة -->
<div id="cart-box">
    <h3 style="color:#FFD700; margin-bottom:10px;">🛒 سلة المشتريات</h3>
    <div id="cart-items"></div>
    <hr style="margin:10px 0; border:0; border-top:1px solid #444;">
    <p id="cart-total" style="font-weight:bold; margin-bottom:15px;">المجموع : 0 د.ع</p>
    <button onclick="sendOrder()" style="width:100%; padding:10px; background:#25D366; border:none; border-radius:8px; color:white; font-weight:bold; cursor:pointer;">
        إرسال الطلب عبر الواتساب 💬
    </button>
</div>

<section id="contact">
    <h2 class="title">تواصل معنا</h2>
    <div class="contact-box">
        <a href="https://wa.me/9647732155557" target="_blank">واتساب</a>
        <a href="https://instagram.com/zekoo_iraq" target="_blank">انستغرام</a>
    </div>
</section>

<footer>
    <p>© 2026 ZEKOO IRAQ</p>
</footer>

<script type="module" src="script.js"></script>
</body>
</html>
