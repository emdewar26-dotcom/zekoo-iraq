<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEKOO IRAQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: #111; color: #fff; padding-bottom: 80px; }
        a { text-decoration: none; color: inherit; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #1a1a1a; border-bottom: 2px solid #ffd700; flex-wrap: wrap; gap: 10px; }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #333; }
        .header h2 { color: #ffd700; }
        nav { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .social-link { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; transition: 0.3s; }
        .social-wa { background: #25D366; color: white; }
        .social-insta { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); color: white; }
        .social-link:hover { transform: scale(1.1); }
        .cart-btn { background: #ffd700; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; color: #000; }
        .hero { text-align: center; padding: 60px 20px; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 20px; }
        .btn { background: #ffd700; padding: 10px 30px; border-radius: 5px; color: #000; font-weight: bold; }
        #cart-box { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; padding: 30px 20px; overflow-y: auto; }
        #cart-box h3 { color: #ffd700; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        #cart-items { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #222;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .cart-item-info { display: flex; flex-direction: column; gap: 5px; }
        .cart-item-title { font-weight: bold; font-size: 1rem; }
        .cart-item-price { color: #ffd700; font-size: 0.9rem; }
        .cart-delete-btn { background: transparent; border: none; color: #ff3333; font-size: 1.2rem; cursor: pointer; padding: 5px 10px; border-radius: 5px; transition: 0.2s; }
        .cart-delete-btn:hover { background: #ff3333; color: white; }
        
        #cart-total { font-size: 1.2rem; color: #ffd700; margin-top: 10px; text-align: left; }
        
        .clear-cart-container { display: flex; justify-content: flex-end; margin-top: 10px; }
        .clear-cart-btn { background: #ff3333; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .clear-cart-btn:hover { background: #cc0000; }

        #send-order-btn { width: 100%; background: #25D366; color: white; padding: 15px; border: none; border-radius: 5px; font-size: 1.1rem; cursor: pointer; font-weight: bold; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        #send-order-btn:hover { background: #20b858; }

        .title { text-align: center; color: #ffd700; margin: 40px 0 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 0 5%; margin-bottom: 50px; }
        .product-card { background: #222; border-radius: 10px; padding: 15px; text-align: center; transition: 0.3s; border: 1px solid transparent; position: relative; }
        .product-card:hover { transform: translateY(-5px); border: 1px solid #ffd700; }
        .product-img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; }
        .product-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; }
        .product-price { color: #ffd700; margin-bottom: 10px; }
        .add-to-cart { background: #333; color: #fff; border: 1px solid #555; padding: 5px 15px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .add-to-cart:hover { background: #ffd700; color: #000; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: #ff3333; color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 16px; font-weight: bold; display: flex; justify-content: center; align-items: center; transition: 0.2s; display: none; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .delete-btn:hover { background: #cc0000; transform: scale(1.1); }
        #secret-trigger { position: fixed; bottom: 20px; right: 20px; background: #222; color: #555; width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; z-index: 1000; border: 1px solid #333; user-select: none; }
        #secret-trigger:hover { background: #333; color: #ffd700; }
        #secret-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1001; justify-content: center; align-items: center; }
        .modal-box { background: #1a1a1a; padding: 30px; border-radius: 10px; border: 1px solid #ffd700; width: 90%; max-width: 350px; text-align: center; }
        .modal-box input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; text-align: center; }
        .modal-box button { width: 100%; padding: 10px; background: #ffd700; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .modal-box .close-btn { background: #444; color: #fff; margin-top: 10px; }
        #admin-panel { display: none; position: fixed; bottom: 80px; right: 20px; background: #1a1a1a; padding: 20px; border: 1px solid #ffd700; border-radius: 10px; width: 320px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.9); }
        #admin-panel h3 { color: #ffd700; margin-bottom: 15px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        #admin-panel input { width: 100%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #333; color: white; border-radius: 5px; }
        #admin-panel input[type="text"] { padding: 10px; }
        .add-btn { width: 100%; background: #ffd700; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; color: #000; font-size: 1rem; }
        .add-btn:hover { background: #e6c200; }
        @media (max-width: 600px) { .header { flex-direction: column; gap: 10px; text-align: center; } .grid-container { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header class="header">
    <div class="logo-box">
        <img src="logo.jpg" class="logo" alt="logo" onerror="this.style.display='none'">
        <h2>ZEKOO IRAQ</h2>
    </div>
    <nav>
        <a href="#">الرئيسية</a>
        <a href="#products">المنتجات</a>
        <a href="https://www.instagram.com/zekoo_iraq?igsh=MTdvY3k0ZjFyYTdyYg==" target="_blank" class="social-link social-insta">📸</a>
        <a href="https://wa.me/9647732155557" target="_blank" class="social-link social-wa">💬</a>
        <button class="cart-btn" onclick="toggleCart()">🛒 السلة (<span id="cart-count">0</span>)</button>
    </nav>
</header>

<section class="hero">
    <div class="hero-text">
        <h1>مرحباً بكم في متجر ZEKOO IRAQ</h1>
        <a href="#products" class="btn">تسوق الآن</a>
    </div>
</section>

<div id="cart-box">
    <h3>🛒 سلة المشتريات <span style="font-weight:normal; font-size:0.9rem; cursor:pointer;" onclick="toggleCart()">❌ إغلاق</span></h3>
    <div id="cart-items"></div>
    <hr>
    <div class="clear-cart-container">
        <button class="clear-cart-btn" onclick="clearCart()">🗑️ مسح الكل</button>
    </div>
    <p id="cart-total">المجموع: 0 د.ع</p>
    <button id="send-order-btn" onclick="sendOrder()">💬 إرسال الطلب عبر الواتساب</button>
</div>

<section id="products">
    <h2 class="title">🔥 أحدث المنتجات</h2>
    <div id="products-container" class="grid-container"></div>
</section>

<!-- الأنظمة السرية -->
<div id="secret-trigger" onclick="openSecretModal()">🔔</div>

<div id="secret-modal">
    <div class="modal-box">
        <h3 style="color:#fff; margin-bottom:10px;">إذن الدخول</h3>
        <input type="password" id="secret-pass" placeholder="أدخل الرمز السري">
        <button onclick="checkSecret()">تأكيد</button>
        <button class="close-btn" onclick="closeSecretModal()">إلغاء</button>
    </div>
</div>

<div id="admin-panel">
    <h3>➕ نشر منتج جديد</h3>
    <input id="p-title" type="text" placeholder="اسم المنتج">
    <input id="p-price" type="number" placeholder="السعر (د.ع)">
    <input id="p-image-url" type="text" placeholder="رابط الصورة (انسخ الرابط وضعه هنا)">
    <button class="add-btn" onclick="addProduct()">نشر المنتج</button>
</div>

<script>
    // ===== الإعدادات =====
    const BIN_ID = '67e6e2be8561e97a50e2f380'; // معرف المخزن
    const API_KEY = '$2a$10$p.b5.Kc2lUJg8kSCP5vUEOVFbO3OIC2GXdthVVgNtZx3VvV3bcYym'; // مفتاح الوصول
    const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    let products = [];
    let cart = JSON.parse(localStorage.getItem('zekoo_cart')) || [];

    // ===== دوال الاتصال بقاعدة البيانات =====
    async function loadProducts() {
        try {
            const response = await fetch(API_URL, {
                method: 'GET',
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await response.json();
            products = data.record || [];
            renderProducts();
        } catch (error) {
            console.error('فشل تحميل المنتجات:', error);
        }
    }

    async function saveProductsToDB() {
        try {
            await fetch(API_URL, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': API_KEY
                },
                body: JSON.stringify(products)
            });
        } catch (error) {
            console.error('فشل حفظ المنتجات:', error);
        }
    }

    // ===== تحميل الصفحة =====
    loadProducts();
    updateCartUI();

    // ===== دوال الرمز السري =====
    function openSecretModal() { document.getElementById('secret-modal').style.display = 'flex'; document.getElementById('secret-pass').value = ''; }
    function closeSecretModal() { document.getElementById('secret-modal').style.display = 'none'; }
    function checkSecret() {
        const pass = document.getElementById('secret-pass').value;
        if (pass === 'athman2003$$') {
            closeSecretModal();
            document.getElementById('admin-panel').style.display = 'block';
            document.querySelectorAll('.delete-btn').forEach(btn => btn.style.display = 'flex');
        } else { alert('❌ رمز سري خاطئ!'); }
    }

    // ===== إضافة منتج جديد (يذهب للعالم كله) =====
    async function addProduct() {
        const title = document.getElementById('p-title').value;
        const price = document.getElementById('p-price').value;
        const imageUrl = document.getElementById('p-image-url').value.trim();

        if (!title || !price || !imageUrl) { 
            alert('الرجاء ملء جميع الحقول: الاسم، السعر، ورابط الصورة!'); 
            return; 
        }

        const newProduct = {
            id: Date.now(),
            title: title,
            price: price,
            image: imageUrl
        };
        
        products.push(newProduct);
        await saveProductsToDB(); // يحفظ في المخزن للأبد
        renderProducts();

        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('p-title').value = ''; 
        document.getElementById('p-price').value = ''; 
        document.getElementById('p-image-url').value = '';
        document.querySelectorAll('.delete-btn').forEach(btn => btn.style.display = 'none');
        alert('✅ تم نشر المنتج بنجاح وسيبقى للأبد!');
    }

    // ===== عرض المنتجات =====
    function renderProducts() {
        const container = document.getElementById('products-container');
        container.innerHTML = '';
        if (products.length === 0) { container.innerHTML = '<p style="text-align:center; grid-column: 1/-1; color:#666;">لا توجد منتجات حالياً.</p>'; return; }
        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <button class="delete-btn" onclick="deleteProduct(${product.id})" title="حذف المنتج">🗑️</button>
                <img src="${product.image}" class="product-img" alt="${product.title}">
                <div class="product-title">${product.title}</div>
                <div class="product-price">${product.price} د.ع</div>
                <button class="add-to-cart" onclick="addToCart(${product.id})">🛒 أضف إلى السلة</button>
            `;
            container.appendChild(card);
        });
    }

    // ===== حذف منتج من المتجر (للجميع) =====
    async function deleteProduct(id) {
        if(confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
            products = products.filter(product => product.id !== id);
            await saveProductsToDB(); // يحذف من المخزن للجميع
            renderProducts();
            alert('🗑️ تم حذف المنتج بنجاح!');
        }
    }

    // ===== دوال السلة =====
    function toggleCart() { 
        const cartBox = document.getElementById('cart-box'); 
        cartBox.style.display = cartBox.style.display === 'block' ? 'none' : 'block'; 
        updateCartUI(); 
    }

    function saveCart() {
        localStorage.setItem('zekoo_cart', JSON.stringify(cart));
    }

    function addToCart(id) { 
        const item = products.find(p => p.id === id); 
        if(item) { 
            cart.push(item); 
            saveCart();
            updateCartUI();
            alert(`✅ تم إضافة ${item.title} إلى السلة`); 
        } 
    }

    function removeFromCart(id) {
        cart = cart.filter(item => item.id !== id);
        saveCart();
        updateCartUI();
    }

    function clearCart() {
        if(cart.length === 0) return alert('السلة فارغة بالفعل!');
        if(confirm('هل أنت متأكد من حذف جميع المنتجات من السلة؟')) {
            cart = [];
            saveCart();
            updateCartUI();
            alert('🗑️ تم مسح السلة بالكامل!');
        }
    }

    function updateCartUI() {
        const container = document.getElementById('cart-items');
        container.innerHTML = '';
        document.getElementById('cart-count').innerText = cart.length;
        let total = 0;
        
        if (cart.length === 0) {
            container.innerHTML = '<p style="text-align:center; padding: 20px; color:#666;">السلة فارغة.</p>';
            document.getElementById('cart-total').innerText = 'المجموع: 0 د.ع';
            return;
        }

        cart.forEach((item) => { 
            total += parseInt(item.price); 
            container.innerHTML += `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <span class="cart-item-title">${item.title}</span>
                        <span class="cart-item-price">${item.price} د.ع</span>
                    </div>
                    <button class="cart-delete-btn" onclick="removeFromCart(${item.id})">🗑️</button>
                </div>
            `; 
        });
        document.getElementById('cart-total').innerText = `المجموع: ${total} د.ع`;
    }

    // ===== إرسال الطلب للواتساب =====
    function sendOrder() {
        if(cart.length === 0) return alert('السلة فارغة!');
        let msg = '🛍️ *طلب جديد من ZEKOO IRAQ:*\n\n';
        cart.forEach((item, index) => {
            msg += `*المنتج ${index + 1}:*\n`;
            msg += `- الاسم: ${item.title}\n`;
            msg += `- السعر: ${item.price} د.ع\n`;
            msg += `- صورة المنتج: ${item.image}\n\n`;
        });
        const total = cart.reduce((a,b) => a + parseInt(b.price), 0);
        msg += `--------------------------\n`;
        msg += `*💰 المجموع الكلي: ${total} د.ع*\n`;
        window.open(`https://wa.me/9647732155557?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
